<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Resume Builder</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">My Resume Builder</div>
      <div class="nav-links">
        <!-- Removed Home and Build Resume buttons -->
        <button id="dashboardBtn">Dashboard</button>
        <button id="myResumeBtn">My Resume</button>
        <button id="toggle-theme">Dark Mode</button>
      </div>
    </div>
  </nav>

  <!-- Removed landing page section -->

  <div id="builderPage" class="container builder">
    <h1>Create Your Resume</h1>
    <form id="portfolioForm">
      <h3>Personal Information</h3>
      <label>Full Name</label>
      <input type="text" id="fullName" required />
      <label>Email</label>
      <input type="email" id="email" required />
      <label>Phone</label>
      <input type="text" id="phone" required />
      <label>Address</label>
      <input type="text" id="address" />
      <label>LinkedIn URL</label>
      <input type="url" id="linkedin" />
      <label>GitHub URL</label>
      <input type="url" id="github" />
      <label>Profile Picture</label>
      <input type="file" id="profilePic" accept="image/*" />

      <h3>Professional Summary</h3>
      <textarea id="bio" rows="4"></textarea>

      <h3>Skills</h3>
      <input type="text" id="skillsInput" placeholder="Add a skill and press Enter" />
      <div id="skillsContainer" class="tag-container"></div>
      <div id="skillSuggestions" class="suggestions"></div>

      <h3>Work Experience</h3>
      <div id="workExperienceContainer">
        <div class="work-entry">
          <label>Company</label>
          <input type="text" class="workCompany" />
          <label>Job Title</label>
          <input type="text" class="workTitle" />
          <label>Duration (e.g., Jan 2023 - Present)</label>
          <input type="text" class="workDuration" />
          <label>Responsibilities (comma separated)</label>
          <textarea class="workResponsibilities" rows="3"></textarea>
        </div>
      </div>
      <button type="button" id="addWorkExperienceBtn"
        style="width: 30rem; height: 2.5rem; margin-left: 17rem; background: rgb(203, 231, 223);">
        Add More Work Experience
      </button>

      <h3>Projects</h3>
      <div id="projectsContainer">
        <div class="project-entry">
          <label>Project Title</label>
          <input type="text" class="projectTitle" />
          <label>Project Duration</label>
          <input type="text" class="projectDuration" />
          <label>Project Description</label>
          <textarea class="projectDescription" rows="3"></textarea>
        </div>
      </div>
      <button type="button" id="addProjectBtn"
        style="width: 30rem; height: 2.5rem; margin-left: 17rem; background: rgb(203, 231, 223);">
        Add More Project
      </button>

      <h3>Education</h3>
      <div id="educationContainer">
        <div class="education-entry">
          <label>Institution Name</label>
          <input type="text" class="educationInstitution" />
          <label>Program/Degree</label>
          <input type="text" class="educationProgram" />
          <label>Duration</label>
          <input type="text" class="educationDuration" />
        </div>
      </div>
      <button type="button" id="addEducationBtn"
        style="width: 30rem; height: 2.5rem; margin-left: 17rem; background: rgb(203, 231, 223);">
        Add More Education
      </button>

      <h3>Languages</h3>
      <input type="text" id="languagesInput" placeholder="Add a language and press Enter" />
      <div id="languagesContainer" class="tag-container"></div>
      <div id="languageSuggestions" class="suggestions"></div>

      <button type="button" id="saveResumeBtn" class="cta-button">💾 Save Resume</button>
      <button type="submit" class="cta-button">Generate Resume Preview</button>
    </form>

    <div id="portfolio" class="portfolio hidden">
      <div class="resume-header">
        <img id="previewPic" src="https://via.placeholder.com/150" alt="Profile Picture" />
        <div class="header-info">
          <h2 id="previewName"></h2>
          <p id="previewSummary"></p>
        </div>
        <div class="contact-info">
          <p id="previewEmail"></p>
          <p id="previewPhone"></p>
          <p id="previewAddress"></p>
          <p><a id="previewLinkedIn"></a></p>
          <p><a id="previewGitHub"></a></p>
        </div>
      </div>

      <div class="resume-main">
        <div class="left-column">
          <div class="section">
            <h3>Work Experience</h3>
            <div id="previewWorkExperience"></div>
          </div>
          <div class="section">
            <h3>Projects</h3>
            <div id="previewProjects"></div>
          </div>
        </div>

        <div class="right-column">
          <div class="section">
            <h3>Education</h3>
            <div id="previewEducation"></div>
          </div>
          <div class="section">
            <h3>Skills</h3>
            <ul id="previewSkills" class="skills-list"></ul>
          </div>
          <div class="section">
            <h3>Languages</h3>
            <ul id="previewLanguages" class="skills-list"></ul>
          </div>
        </div>
      </div>
    </div>
    <button id="downloadBtn" class="cta-button hidden">📄 Download Resume as PDF</button>
  </div>

  <div id="myResumePage" class="container builder hidden">
    <h1>My Saved Resumes</h1>
    <div id="resumesContainer" class="resumes-grid">
      <div class="resume-card" data-id="some_unique_id">
        <div class="resume-card-header">
          <img src="https://via.placeholder.com/50" alt="Profile Picture" />
          <h4>Resume Title</h4>
        </div>
        <div class="resume-card-body">
          <p>Brief summary of the resume</p>
        </div>
        <div class="resume-card-actions">
          <button class="view-btn">View</button>
          <button class="edit-btn">Edit</button>
          <button class="delete-btn">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <div id="previewModal" class="modal hidden">
    <div class="modal-content">
      <span class="close-button">&times;</span>
      <div id="modal-preview"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="script.js"></script>
</body>

</html>
